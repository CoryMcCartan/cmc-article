title: cmc-article
author: Cory McCartan
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    common:
      journal:
        blinded: false
      font-sans-biolinum: true
      font-serif-crimson: true
      font-headings-sans: true
      number-sections: true
      number-depth: 4
      toc: false
      fontsize: 11pt
      indent: false
      date-format: long
      fig-width: 7
      fig-height: 3.5
      fig-format: pdf
      citecolor: "#8b2252"
      linkcolor: "#000000"
      urlcolor: "#104e8b"
      crossref:
        eq-prefix: Eq.
      filters:
        - app.lua
        - wordcount.lua
        - assump.lua
      execute:
        echo: false
        warning: false
    pdf:
      template-partials:
        - partials/passoptions.latex
        - partials/fonts.latex
        - partials/before-title.tex
        - partials/title.tex
        - partials/before-body.tex
      pdf-engine: pdflatex
      cite-method: natbib
      biblio-style: apalike
      block-headings: false
      colorlinks: true
      margin-top: 1in
      margin-left: 1in
      margin-right: 1in
      margin-bottom: 1in
    typst:
      template-partials:
        - partials/page.typ
        - partials/typst-show.typ
        - partials/typst-template.typ
      bibliographystyle: apa
      citeproc: true
      section-numbering: "1.1.1.1"
      margin:
        x: 1in
        y: 1in



